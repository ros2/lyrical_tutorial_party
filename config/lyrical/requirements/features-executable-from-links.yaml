- name: Topic monitor
  shortname: topic_monitor
  description: ''
  steps:
  - name: Comparing reliability QoS settings
    description: null
    action:
    - !Describe |
      You will need two machines with ROS 2: one mobile and one stationary.
    - !StdIn
      number: 1
      text: ros2 run topic_monitor topic_monitor --display
    - !Describe |
      Run the `ros2 launch topic_monitor reliability_demo_launch.py` executable on the stationary machine. This will start two nodes: one publishing in “reliable” mode, and one in “best effort”.
    - !StdIn
      number: 1
      text: ros2 launch topic_monitor reliability_demo_launch.py
    - !Describe |
      Start the monitor on a mobile machine such as a laptop. Use `ros2 run topic_monitor topic_monitor --display --allowed-latency 5` to account for any latency that may occur re-sending the reliable messages.
    - !StdIn
      number: 1
      text: ros2 run topic_monitor topic_monitor --display --allowed-latency 5
    - !Describe Take the mobile machine out of range of the monitor, and observe how the reception rates differ for the different topics.
    expect:
    - !Describe |
      You should see that the "reliable" topic has a reception rate that is almost always either 0 or 100%, while the "best effort" topic has a reception rate that fluctuates based on the strength of the connection.
    - !Image https://raw.githubusercontent.com/ros2/demos/lyrical/topic_monitor/doc/reliability_comparison.png
  labels:
  - executable
  - feature
  - topic_monitor
  links:
  - name: Reference URL
    url: https://github.com/ros2/demos/blob/lyrical/topic_monitor/README.md
