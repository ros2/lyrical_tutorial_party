- name: Quality of Service Demos
  shortname: quality_of_service_d
  description: ''
  steps:
  - name: Deadline with pause
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp deadline 600 --publish-for 5000 --pause-for 2000
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py deadline 600 --publish-for 5000 --pause-for 2000
    expect:
    - !Describe The publisher will publish for 5 seconds, then pause for 2 - deadline events will start firing on both participants, until the publisher comes back.
  - name: Deadline no pause
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp deadline 600 --publish-for 5000 --pause-for 0
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py deadline 600 --publish-for 5000 --pause-for 0
    expect:
    - !Describe The publisher doesn't actually pause, no deadline misses should occur.
  - name: Lifespan, some survive
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp lifespan 1000 --publish-count 10 --subscribe-after 3000
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py lifespan 1000 --publish-count 10 --subscribe-after 3000
    expect:
    - !Describe |
      After a few seconds, you should see (approximately) messages 4-9 printed from the subscriber.

      The first few messages, with 1 second lifespan, were gone by the time the subscriber joined after 3 seconds.
  - name: Lifespan, all survive
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp lifespan 4000 --publish-count 10 --subscribe-after 3000
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py lifespan 4000 --publish-count 10 --subscribe-after 3000
    expect:
    - !Describe |
      After a few seconds, you should see all of the messages (0-9) printed from the subscriber.

      All messages, with their 4 second lifespan, survived until the subscriber joined.
  - name: Liveliness
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp liveliness 1000 --kill-publisher-after 2000
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py liveliness 1000 --kill-publisher-after 2000
    expect:
    - !Describe After 2 seconds, the publisher will be killed, and the subscriber will receive a callback 1 second after that notifying it that the liveliness has changed.
  - name: Incompatible QoS Offered/Requested
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp incompatible_qos durability
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_py incompatible_qos durability
    expect:
    - !Describe |
      The publisher in this demo will publish 5 messages, but also output a notification stating that its offered QoS is incompatible with the subscriber that is also created by this demo. The subscriber in this demo will similarly output a notification stating that its requested QoS is incompatible with the QoS offered by the publisher.
  - name: Interactive Quality of Service Demo
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run quality_of_service_demo_cpp interactive_publisher
    - !StdIn
      number: 2
      text: ros2 run quality_of_service_demo_cpp interactive_subscriber
    - !Describe In the publisher's terminal, press `p` to manually assert the liveliness of the publisher, for when Liveliness kind is `MANUAL_BY_TOPIC`.
    - !Describe In the publisher's terminal, press `s` to toggle enabling/disabling of publishing messages
    - !Describe In the publisher and subscriber's terminal, press `q` to print the current QoS policy.
    - !Describe In the publisher and subscriptions's terminal, press `x` to stop and exit the demo.
    expect:
    - !Describe All key-press commands work.
  labels:
  - executable
  - feature
  - qos
  links:
  - name: Demo URL
    url: https://github.com/ros2/demos/blob/lyrical/quality_of_service_demo/README.md
