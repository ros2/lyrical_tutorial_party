- name: Rviz
  shortname: rviz
  description: |
    This is a sanity check to ensure that the GUI tools aren't fundamentally broken.
  steps:
  - name: Check Rviz
    description: |
      Launch using the `rviz2` command.

      The rviz window should be generally usable and should be able to load some of the discovered visualizations.

      Loading visualizations into the tree and using the mouse to navigate through the virtual workspace is sufficient for this test.
    action:
    - !StdIn
      number: 1
      text: ros2 launch dummy_robot_bringup dummy_robot_bringup_launch.py
    - !StdIn
      number: 2
      text: rviz2
    - !Describe In RViz, in the left pane, click 'Add'. A window will pop up. In that window, under 'rviz_default_plugins', select 'TF' and click 'OK'. Under 'Displays', in the 'Global Options' section, change the 'Fixed Frame' to '/world'.
    - !Describe In RViz, in the left pane, click 'Add'. A window will pop up. In that window, under 'rviz_default_plugins', select 'LaserScan' and click 'OK'. Under 'Displays', in the 'LaserScan' section, change the 'Topic' to '/scan'.
    expect:
    - !Describe You should see the dummy robot's kinematic tree waving back and forth in the rviz window.
    - !Describe You should see a laser scan emitting from the waving end of the dummy robot.
    - !Describe Play around, move the camera, enable and disable things in the 'Displays' pane. RViz should be stable.
  labels:
  - rviz
  - visualization
  - core
  links:
  - name: Repo URL
    url: https://github.com/ros2/rviz
- name: RQT
  shortname: rqt
  description: |
    This is a sanity check to ensure that the GUI tools aren't fundamentally broken.
  steps:
  - name: Check RQT
    description: |
      Launch using the `rqt` command.

      The rqt window should be generally usable and should be able to populate some of the discovered plugins.
    action:
    - !StdIn
      number: 1
      text: ros2 launch dummy_robot_bringup dummy_robot_bringup_launch.py
    - !StdIn
      number: 2
      text: rqt
    - !Describe In the RQT window, select 'Plugins > Visualization > Plot' in the dropdown menu. In the window that opens, set the Topic to `/joint_states/position[0]`. You should see a Sine wave.
    - !Describe With 'Plugins > Introspection > Node Graph' you should see a network of the nodes and topics that are being published and subscribed by the dummy robot.
    - !Describe With 'Plugins > Logging > Bag' you should be able record a ROS Bag file.
    - !Describe With 'Plugins > Topic > Topic Monitor' you should be able to check the `/joint_states` topic and view messages streaming in.
    expect:
    - !Describe Rqt runs smoothly and the plugins work as expected.
  labels:
  - rqt
  - visualization
  - core
  links:
  - name: Repo URL
    url: https://github.com/ros-visualization/rqt
