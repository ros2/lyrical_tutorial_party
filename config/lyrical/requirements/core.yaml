requirements:
- name: ros2cli on a local machine
  shortname: ros_2_cli_on_a_local_machine
  description: |
    Test the basic functionality of the ros2cli package family
  steps:
  - name: Help text
    description: |
      Long-form help text should be available when invoking `ros2 --help` as well as `ros2 <command> --help`
    action:
    - !StdIn
      number: 1
      text: ros2 -h
    - !StdIn
      number: 1
      text: ros2 --help
    - !StdIn
      number: 1
      text: ros2 topic -h
    - !StdIn
      number: 1
      text: ros2 topic --help
    expect:
    - !Describe Long-form help is available.
  - name: Tab completion
    description: |
      When using a supported shell (i.e. bash), tab completion should work for both the bare executable to list commands and for listing sub-commands, like `ros2 <tab>` or `ros2 <command> tab`
      [Note]: Skip this test on Windows as tab completion is not supported.
    action:
    - !Describe Lists the commands
    - !StdIn
      number: 1
      text: ros2 <tab><tab>
    - !Describe Completes the word `launch`
    - !StdIn
      number: 1
      text: ros2 lau<tab>
    - !Describe Completes until `demo_nodes_`
    - !StdIn
      number: 1
      text: ros2 launch dem<tab>
    - !Describe Completes the package `demo_nodes_cpp`
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_c<tab>
    - !Describe Lists launch files in `demo_nodes_cpp`
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp <tab><tab>
    - !Describe Suggests the launch files name `talker_listener`
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp ta<tab>
    - !Describe Lists several launch files that start with `talker_listener`
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp talker_listener_<tab><tab>
    - !Describe Completes the launch files name `talker_listener_launch.py`
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp talker_listener_launch.p<tab>
    expect:
    - !Describe You eventually get to the full command
    - !Describe 'Stdin: "ros2 launch demo_nodes_cpp talker_listener_launch.py"'
  - name: Node discovery
    description: |
      With another node running, use `ros2 node list` to ensure that the expected node is listed. Then stop the node and ensure that the list operation no longer shows the node.
    action:
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp talker_listener_launch.py
    - !StdIn
      number: 2
      text: ros2 node list
    expect:
    - !StdOut
      number: 2
      text: |
        /listener
        /talker
  - name: Topic discovery
    description: |
      With another node running, use `ros2 topic list` to ensure that the expected topics are listed. Then stop the node and ensure that the list operation no longer shows the node's topics.
    action:
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp talker_listener_launch.py
    - !StdIn
      number: 2
      text: ros2 topic list
    expect:
    - !StdOut
      number: 2
      text: |
        /chatter
        /parameter_events
        /rosout
  - name: Service discovery
    description: |
      With another node running, use `ros2 service list` to ensure that the expected services are listed. Then stop the node and ensure that the list operation no longer shows the node's services.
    action:
    - !StdIn
      number: 1
      text: ros2 run demo_nodes_cpp add_two_ints_server
    - !StdIn
      number: 2
      text: ros2 service list
    expect:
    - !StdOut
      number: 2
      text: |
        /add_two_ints
        /add_two_ints_server/describe_parameters
        /add_two_ints_server/get_parameter_types
        /add_two_ints_server/get_parameters
        /add_two_ints_server/get_type_description
        /add_two_ints_server/list_parameters
        /add_two_ints_server/set_parameters
        /add_two_ints_server/set_parameters_atomically
  - name: Parameter discovery
    description: |
      With another node running, use `ros2 param list` to ensure that the expected parameters are listed. Then stop the node and ensure that the list operation no longer shows the node's parameters.
    action:
    - !StdIn
      number: 1
      text: ros2 run turtlesim turtlesim_node
    - !StdIn
      number: 2
      text: ros2 param list
    expect:
    - !StdOut
      number: 2
      text: |
        /turtlesim:
          background_b
          background_g
          background_r
          holonomic
          qos_overrides./parameter_events.publisher.depth
          qos_overrides./parameter_events.publisher.durability
          qos_overrides./parameter_events.publisher.history
          qos_overrides./parameter_events.publisher.reliability
          start_type_description_service
          use_sim_time
  labels:
  - ros2cli
  - local
  - core
  links:
  - name: Repo URL
    url: https://github.com/ros2/ros2cli
