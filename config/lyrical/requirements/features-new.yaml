requirements:
- name: Service introspection cpp
  shortname: service_introspection_cpp
  description: ''
  steps:
  - name: Run the client and server
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp introspect_services_launch.py
    - !StdIn
      number: 2
      text: ros2 topic list --include-hidden-topics
    expect:
    - !StdOut
      number: 1
      text: |
        [introspection_service-1] a: 2 b: 3
        [introspection_client-2] [INFO] [1680585324.964598437] [introspection_client]: Result of add_two_ints: 5
    - !StdOut
      number: 2
      text: |
        /parameter_events
        /rosout
  - name: Configure service to send introspection metadata
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 launch demo_nodes_cpp introspect_services_launch.py
    - !StdIn
      number: 2
      text: ros2 param set /introspection_service service_configure_introspection metadata
    - !StdIn
      number: 2
