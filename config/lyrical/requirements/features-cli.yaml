requirements:
- name: Check action Cli
  shortname: check_action_cli
  description: ''
  steps:
  - name: Check info
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run examples_rclcpp_minimal_action_server action_server_member_functions
    - !StdIn
      number: 2
      text: ros2 action info /fibonacci
    expect:
    - !StdOut
      number: 2
      text: |
        Action: /fibonacci
        Action clients: 0
        Action servers: 1
          /minimal_action_server
  - name: Check list
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run examples_rclcpp_minimal_action_server action_server_member_functions
    - !StdIn
      number: 2
      text: ros2 action list
    expect:
    - !StdOut
      number: 2
      text: /fibonacci
  - name: Check send_goal
    description: null
    action:
    - !StdIn
      number: 1
      text: ros2 run examples_rclcpp_minimal_action_server action_server_member_functions
    - !StdIn
      number: 2
      text: ros2 action send_goal /fibonacci example_interfaces/action/Fibonacci order:\ 2
    expect:
    - !StdOut
      number: 2
      text: |
        Waiting for an action server to become available...
        Sending goal:
            order: 2

        Goal accepted with ID: 0110dbd59e804374bff8e4900c3201e8

        Result:
            sequence:
        - 0
        - 1
        - 1

        Goal finished with status: SUCCEEDED
  labels:
  - ros2cli
  - feature
  - ros2action
  links: null
- name: Check ROS 2 bag CLI
  shortname: check_ros_2_bag_cli
  description: ''
  steps:
  - name: Check record
    description: null
    action:
    - !Describe You should stop the talker once the recording is stopped.
    - !StdIn
      number: 1
      text: ros2 run demo_nodes_cpp talker
    - !Describe Run for a few seconds and then hit Ctrl-C to stop the bag recording.
    - !StdIn
      number: 2
      text: ros2 bag record /chatter -o my-bag
    expect:
    - !Describe You should see a folder named my-bag in the current directory
  - name: Check info
    description: null
    action:
    - !Describe Continuing from the previous check.
    - !StdIn
      number: 1
      text: ros2 bag info my-bag
    expect:
    - !Describe Something like the following
    - !StdOut
      number: 1
      text: |
        Files:             my-bag_0.mcap
        Bag size:          3.0 KiB
        Storage id:        mcap
        Duration:          3.999s
        Start:             Apr  2 2023 13:45:47.834 (1680414347.834)
        End:               Apr  2 2023 13:45:51.834 (1680414351.834)
        Messages:          5
        Topic information: Topic: /chatter | Type: std_msgs/msg/String | Count: 5 | Serialization Format: cdr
  - name: Check play
    description: null
    action:
    - !Describe Continuing from the previous two checks. Make sure that the talker is stopped.
    - !Describe The `-l` option loops the bag. You should kill this process eventually with Ctrl-C.
    - !StdIn
      number: 1
      text: ros2 bag play -l my-bag
    - !StdIn
      number: 2
      text: ros2 topic echo /chatter
    expect:
    - !Describe Something like the following.
    - !StdOut
      number: 2
      text: |
        ---
        data: 'Hello World: 77'
        ---
        data: 'Hello World: 78'
        ---
        data: 'Hello World: 75'
        ---
        data: 'Hello World: 76'
        ---
        data: 'Hello World: 77'
        ---
  labels:
  - ros2cli
  - feature
  - ros2bag
  links: null
